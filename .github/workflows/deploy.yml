name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v6

      # Read the Skill registry and emit a sequence of "owner/repo,dir" lines
      # for the next step to clone. Driven by data/skills.yaml so adding a
      # new Skill is one PR with no workflow edits.
      - name: Resolve Skill registry
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          # Map each repo basename to the directory name our corpus loader
          # expects (the loader has a matching alias on its side).
          declare -A ALIAS
          ALIAS[prime-corpus-frontend]=prime-corpus-frontend-design
          # Extract unique "owner/repo" → "dir" pairs from data/skills.yaml.
          # We use a tiny awk parser so we don't need yq/python in the runner.
          mapfile -t REPOS < <(awk '
            /^[[:space:]]*-/ { in_item=1 }
            in_item && /^[[:space:]]+repo:[[:space:]]*/ {
              gsub(/^[[:space:]]+repo:[[:space:]]*/, ""); print
            }
          ' data/skills.yaml | sort -u)
          # Emit one line per repo: "owner/repo dir".
          {
            for r in "${REPOS[@]}"; do
              base="${r##*/}"
              dir="${ALIAS[$base]:-$base}"
              echo "$r $dir"
            done
          } > .vendor-list.txt
          echo "Vendor list:"; cat .vendor-list.txt

      # Clone each unique source repo into external/<dir>. This is dynamic so
      # we never need to touch the workflow when authors PR new Skills.
      - name: Vendor Skill source repos
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p external
          while IFS=' ' read -r repo dir; do
            [ -z "$repo" ] && continue
            echo "→ cloning $repo into external/$dir"
            # Soft-fail: a Skill listed in skills.yaml whose repo isn't pushed
            # yet should not block the whole site deploy. The corpus loader
            # tolerates a missing dir and just omits that Skill from the
            # marketplace; the next deploy after the repo exists picks it up.
            if ! git clone --depth 1 "https://github.com/$repo.git" "external/$dir" 2>&1; then
              echo "::warning::Skipping $repo — clone failed (repo may not be public yet)"
            fi
          done < .vendor-list.txt
          echo "Vendored:"; ls external 2>/dev/null || echo "(none)"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
