name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      # Vendor the two sibling repos that hold the actual corpus data the
      # marketplace / browse / atom pages render from. The website's corpus
      # loader looks under `external/` first, then falls back to `..` for
      # local monorepo dev.
      - name: Checkout prime-system (protocol + example corpora)
        uses: actions/checkout@v4
        with:
          repository: skill-wiki/prime-system
          path: external/prime-system

      - name: Checkout prime-corpus-frontend (flagship corpus)
        uses: actions/checkout@v4
        with:
          repository: skill-wiki/prime-corpus-frontend
          # Path matches the directory name the corpus loader expects.
          path: external/prime-corpus-frontend-design

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
