# Skill Wiki marketplace registry
#
# Each entry is one Skill that the marketplace discovers, vendors at build
# time, and renders. To publish your own Skill: open a PR adding an entry
# below. See CONTRIBUTING.md for the full guide.
#
# Required fields:
#   slug         — short URL-safe id; appears in /atom/<slug>/...
#   repo         — GitHub "owner/repo"; cloned into external/<slug>/
#   compiledSubdir — relative to the repo, where _index.xml lives
#
# Optional fields:
#   subpath      — if the Skill lives inside a subfolder of the repo
#   description  — one-line copy shown on the marketplace card
#   flagship     — true for the featured pack (one max)
#   featured     — pin this Skill near the top of the marketplace
#   homepage     — link the marketplace card title goes to (default: GitHub)
#   maintainers  — list of GitHub usernames for the "Maintained by" line
#   tags         — short list of keywords for search (planned)

skills:
  - slug: frontend-design
    repo: skill-wiki/prime-corpus-frontend
    compiledSubdir: compiled-v3-final
    description: |
      898 typed atoms across 9 design sub-domains — color, type, motion,
      spacing, accessibility, voice, hierarchy, layout, components.
      Reference Skill + reference application; 5-tool MCP wrapper.
    flagship: true
    homepage: https://github.com/skill-wiki/prime-corpus-frontend
    maintainers: [skill-wiki]
    tags: [frontend, design, accessibility, typography, motion]

  - slug: recipes
    repo: skill-wiki/prime-system
    subpath: examples/recipes
    compiledSubdir: primes/compiled
    description: |
      A trivial cooking example — methods, terms, rules, tradeoffs.
      Smallest end-to-end Skill you can read in one sitting.
    maintainers: [skill-wiki]
    tags: [example, cooking]

  - slug: coding-style
    repo: skill-wiki/prime-system
    subpath: examples/coding-style
    compiledSubdir: primes/compiled
    description: |
      An example team coding-style Skill. Patterns, rules, anti-patterns
      — the shape an internal style guide takes once it's typed.
    maintainers: [skill-wiki]
    tags: [example, coding, style]

  - slug: hello-world
    repo: skill-wiki/prime-system
    subpath: examples/hello-world
    compiledSubdir: primes/compiled
    description: |
      The canonical "first Skill" — 8 atoms about boiling water and
      making tea. Read this first to learn the DSL.
    maintainers: [skill-wiki]
    tags: [example, learning]

  - slug: backend-architecture
    repo: skill-wiki/skill-corpus-backend
    compiledSubdir: compiled
    description: |
      12-Factor App + canonical microservices patterns (Saga, Circuit Breaker,
      API Gateway, etc.). Atom-shaped principles for distributed-system
      architecture decisions.
    homepage: https://github.com/skill-wiki/skill-corpus-backend
    maintainers: [skill-wiki]
    tags: [backend, microservices, architecture, 12factor]

  - slug: security-appsec
    repo: skill-wiki/skill-corpus-security
    compiledSubdir: compiled
    description: |
      OWASP Cheat Sheet distilled into typed atoms — input validation, auth,
      sessions, crypto, SQLi/XSS/CSRF prevention. Starter set; growing.
    homepage: https://github.com/skill-wiki/skill-corpus-security
    maintainers: [skill-wiki]
    tags: [security, owasp, web, backend]

  - slug: web-style
    repo: skill-wiki/skill-corpus-web-style
    compiledSubdir: compiled
    description: |
      Airbnb JavaScript + Google styleguides distilled into typed atoms —
      naming, functions, modules, anti-patterns. Starter set.
    homepage: https://github.com/skill-wiki/skill-corpus-web-style
    maintainers: [skill-wiki]
    tags: [web, javascript, style, airbnb, google]

  - slug: android-compose
    repo: skill-wiki/skill-corpus-android-compose
    compiledSubdir: compiled
    description: |
      Jetpack Compose API guidelines + Material 3 design tokens as typed
      atoms — composable rules, state hoisting, accessibility, motion.
    homepage: https://github.com/skill-wiki/skill-corpus-android-compose
    maintainers: [skill-wiki]
    tags: [android, compose, material3, mobile]

  - slug: ios-swift
    repo: skill-wiki/skill-corpus-ios-swift
    compiledSubdir: compiled
    description: |
      Swift API Design Guidelines + Google Swift style as typed atoms —
      naming, protocols, optionals, concurrency.
    homepage: https://github.com/skill-wiki/skill-corpus-ios-swift
    maintainers: [skill-wiki]
    tags: [ios, swift, mobile, api-design]
